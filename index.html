<!DOCTYPE html>
<html>
<head>
    <title>Data Redundancy Removal System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Data Redundancy Removal System</h2>

<form method="POST">

<label>Name</label>

<input type="text" name="name" required>

<label>Email</label>

<input type="email" name="email" required>

<label>Phone</label>

<input type="text" name="phone" required>

<button type="submit">Save</button>

</form>

<h3>{{ message }}</h3>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

{% for user in users %}

<tr>
<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>
<td>{{ user[2] }}</td>
<td>{{ user[3] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
